[compileJava, compileTestJava]*.options*.encoding = 'UTF-8'
eclipse.project.name = appName + '-core'

dependencies {
  api "com.badlogicgames.gdx:gdx:$gdxVersion"

  if(enableGraalNative == 'true') {
    implementation "io.github.berstanio:gdx-svmhelper-annotations:$graalHelperVersion"
  }
}

task runRegressionTests(type: JavaExec) {
  description = 'Runs EngineRegressionSelfTest (no window required)'
  classpath = sourceSets.main.runtimeClasspath
  mainClass = 'io.github.some_example_name.tests.unit.EngineRegressionSelfTest'
}

task runGameRegressionTests(type: JavaExec) {
  description = 'Runs GameRegressionSelfTest (no window required)'
  classpath = sourceSets.main.runtimeClasspath
  mainClass = 'io.github.some_example_name.game.tests.GameRegressionSelfTest'
}
